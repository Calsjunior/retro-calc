<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Retro calc (short for Calculator)</title>
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Bungee&family=Orbitron:wght@400..900&display=swap"
            rel="stylesheet">
        <script src="script.js" defer></script>
    </head>
    <body>
        <section class="calc">
            <header class="calc__header"><output class="calc__result">0</output></header>

            <div class="calc__keypad">
                <ul class="calc__row">
                    <li class="calc__item">
                        <button
                            type="button"
                            class="calc__btn calc__btn--function"
                            data-type="function"
                            value="backspace">
                            x
                        </button>
                    </li>
                    <li class="calc__item">
                        <button
                            type="button"
                            class="calc__btn calc__btn--function"
                            data-type="function"
                            value="clear">
                            C
                        </button>
                    </li>
                    <li class="calc__item">
                        <button
                            type="button"
                            class="calc__btn"
                            data-type="operator"
                            value="modulo">
                            %
                        </button>
                    </li>
                    <li class="calc__item">
                        <button
                            type="button"
                            class="calc__btn calc__btn--operator"
                            data-type="operator"
                            value="divide">
                            &divide;
                        </button>
                    </li>
                </ul>

                <ul class="calc__row">
                    <li class="calc__item">
                        <button
                            type="button"
                            class="calc__btn"
                            data-type="number"
                            value="7">
                            7
                        </button>
                    </li>
                    <li class="calc__item">
                        <button
                            type="button"
                            class="calc__btn"
                            data-type="number"
                            value="8">
                            8
                        </button>
                    </li>
                    <li class="calc__item">
                        <button
                            type="button"
                            class="calc__btn"
                            data-type="number"
                            value="9">
                            9
                        </button>
                    </li>
                    <li class="calc__item">
                        <button
                            type="button"
                            class="calc__btn calc__btn--operator"
                            data-type="operator"
                            value="multiply">
                            x
                        </button>
                    </li>
                </ul>

                <ul class="calc__row">
                    <li class="calc__item">
                        <button
                            type="button"
                            class="calc__btn"
                            data-type="number"
                            value="4">
                            4
                        </button>
                    </li>
                    <li class="calc__item">
                        <button
                            type="button"
                            class="calc__btn"
                            data-type="number"
                            value="5">
                            5
                        </button>
                    </li>
                    <li class="calc__item">
                        <button
                            type="button"
                            class="calc__btn"
                            data-type="number"
                            value="6">
                            6
                        </button>
                    </li>
                    <li class="calc__item">
                        <button
                            type="button"
                            class="calc__btn calc__btn--operator"
                            data-type="operator"
                            value="subtract">
                            -
                        </button>
                    </li>
                </ul>

                <ul class="calc__row">
                    <li class="calc__item">
                        <button
                            type="button"
                            class="calc__btn"
                            data-type="number"
                            value="1">
                            1
                        </button>
                    </li>
                    <li class="calc__item">
                        <button
                            type="button"
                            class="calc__btn"
                            data-type="number"
                            value="2">
                            2
                        </button>
                    </li>
                    <li class="calc__item">
                        <button
                            type="button"
                            class="calc__btn"
                            data-type="number"
                            value="3">
                            3
                        </button>
                    </li>
                    <li class="calc__item">
                        <button
                            type="button"
                            class="calc__btn calc__btn--operator"
                            data-type="operator"
                            value="add">
                            +
                        </button>
                    </li>
                </ul>

                <ul class="calc__row">
                    <li class="calc__item">
                        <button
                            type="button"
                            class="calc__btn calc__btn--function"
                            data-type="function"
                            value="plusminus">
                            +/-
                        </button>
                    </li>
                    <li class="calc__item">
                        <button
                            type="button"
                            class="calc__btn"
                            data-type="number"
                            value="0">
                            0
                        </button>
                    </li>
                    <li class="calc__item">
                        <button
                            type="button"
                            class="calc__btn"
                            data-type="number"
                            value=".">
                            .
                        </button>
                    </li>
                    <li class="calc__item">
                        <button
                            type="button"
                            class="calc__btn calc__btn--operator"
                            data-type="operator"
                            value="equal">
                            =
                        </button>
                    </li>
                </ul>
            </div>
        </section>
    </body>
</html>
