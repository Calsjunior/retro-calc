<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Retro calc (short for Calculator)</title>
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Bungee&family=Orbitron:wght@400..900&display=swap"
            rel="stylesheet">
        <script src="script.js" defer></script>
    </head>
    <body>
        <section class="calc">
            <header class="calc__header"><output class="calc__result">0</output></header>

            <div class="calc__keypad">
                <ul class="calc__row">
                    <li class="calc__item">
                        <button type="button" class="calc__btn">x</button>
                    </li>
                    <li class="calc__item">
                        <button type="button" class="calc__btn">C</button>
                    </li>
                    <li class="calc__item">
                        <button type="button" class="calc__btn">%</button>
                    </li>
                    <li class="calc__item">
                        <button type="button" class="calc__btn calc__btn--operator">
                            &divide;
                        </button>
                    </li>
                </ul>

                <ul class="calc__row">
                    <li class="calc__item">
                        <button type="button" class="calc__btn">7</button>
                    </li>
                    <li class="calc__item">
                        <button type="button" class="calc__btn">8</button>
                    </li>
                    <li class="calc__item">
                        <button type="button" class="calc__btn">9</button>
                    </li>
                    <li class="calc__item">
                        <button type="button" class="calc__btn calc__btn--operator">
                            x
                        </button>
                    </li>
                </ul>

                <ul class="calc__row">
                    <li class="calc__item">
                        <button type="button" class="calc__btn">4</button>
                    </li>
                    <li class="calc__item">
                        <button type="button" class="calc__btn">5</button>
                    </li>
                    <li class="calc__item">
                        <button type="button" class="calc__btn">6</button>
                    </li>
                    <li class="calc__item">
                        <button type="button" class="calc__btn calc__btn--operator">
                            -
                        </button>
                    </li>
                </ul>

                <ul class="calc__row">
                    <li class="calc__item">
                        <button type="button" class="calc__btn">1</button>
                    </li>
                    <li class="calc__item">
                        <button type="button" class="calc__btn">2</button>
                    </li>
                    <li class="calc__item">
                        <button type="button" class="calc__btn">3</button>
                    </li>
                    <li class="calc__item">
                        <button type="button" class="calc__btn calc__btn--operator">
                            +
                        </button>
                    </li>
                </ul>

                <ul class="calc__row">
                    <li class="calc__item">
                        <button type="button" class="calc__btn">+/-</button>
                    </li>
                    <li class="calc__item">
                        <button type="button" class="calc__btn">0</button>
                    </li>
                    <li class="calc__item">
                        <button type="button" class="calc__btn">.</button>
                    </li>
                    <li class="calc__item">
                        <button type="button" class="calc__btn calc__btn--operator">
                            =
                        </button>
                    </li>
                </ul>
            </div>
        </section>
    </body>
</html>
